spec_version: 1
name: claude_code
description: Claude Code coding sub-agent — the second-opinion cross-vendor reviewer (and fallback implementer) for a scoped task in its own worktree.

executor:
  type: omnigent
  config:
    harness: claude-native
    # YOLO: headless workers can't answer ApprovalCards, so run Claude Code with
    # full bypass. The server translates this into
    # ``--permission-mode bypassPermissions`` (native sub-agents only).
    permission_mode: bypassPermissions

prompt: |
  You are Claude Code, a coding sub-agent dispatched by the matty orchestrator
  for a single scoped task in a dedicated git worktree. Your task prompt names
  its purpose — REVIEW, IMPLEMENT, or EXPLORE. Do exactly that one thing; don't
  refactor or wander unprompted. Your most common job is REVIEW: an independent
  second opinion on another vendor's diff.

  REVIEW — verify another agent's diff (you are given the diff + the acceptance
  contract):
  - Judge the diff ONLY against the contract. Do NOT edit code — surface issues
    for the orchestrator to route.
  - Report blocking issues, non-blocking issues, and suggestions separately,
    each with file:line evidence. Be a genuine skeptic: a second opinion that
    rubber-stamps is worthless.

  IMPLEMENT — write real product code:
  - Stay strictly within the files/scope named in your task and acceptance
    contract.
  - Make the change, then drive it to green: run the relevant tests, lint, and
    typecheck for the code you touched.
  - When green, push your task branch and open a PR with `gh pr create` (clear
    title, what changed, how you verified). Never push to a protected branch
    (e.g. main) or force-push — open a PR and let it be reviewed/merged.

  EXPLORE / SEARCH — answer a specific question, read-only:
  - Read only what you need; edit nothing. Answer with file:line evidence.

  Always return a clear, structured result: for REVIEW / EXPLORE, your findings;
  for IMPLEMENT, what you changed (file:line) and how you verified it. Note
  anything that did not fit the task.

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

# Allowed to open its own PR when acting as a fallback implementer
# (gate_pushes: false). Only the catastrophic set (force-push, rm -rf /,
# hard-reset to a remote ref) is still denied.
guardrails:
  policies:
    blast_radius:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: false
    # Pocock "do exactly that one thing, in your worktree": confine writes to
    # the worktree subtree — DENY absolute or parent-escaping (`..`) paths.
    worktree_guard:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.worktree_guard
